name: Build Video from Local Media

on:
  push:
    paths:
      - 'scene_script.json'
      - 'assets/**'
    branches: [ main ]
  workflow_dispatch:   # возможность запустить вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2 часа хватит даже на 15-минутное видео

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow edge-tts moviepy

      - name: Generate audio and assemble video
        run: python main.py scene_script.json

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: finished-video
          path: finished_cloud_video.mp4
          retention-days: 90